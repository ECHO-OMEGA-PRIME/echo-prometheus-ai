name = "echo-prometheus-ai"
main = "src/index.ts"
compatibility_date = "2024-12-01"
usage_model = "unbound"

[vars]
ENVIRONMENT = "production"
VERSION = "2.0.0"
PROMETHEUS_URL = "http://192.168.1.202:8370"
CHARLIE_NODE = "192.168.1.202"

[[d1_databases]]
binding = "DB"
database_name = "echo-prometheus-ai"
database_id = "bf2c713a-0a3c-4fa7-b28b-993bff61bd32"

[[kv_namespaces]]
binding = "CACHE"
id = "3fb2ddfcce4f44cf9ea6a7f336884f5e"

[ai]
binding = "AI"

[[services]]
binding = "BRAIN"
service = "echo-shared-brain"

[[services]]
binding = "ENGINES"
service = "echo-engine-runtime"

[[services]]
binding = "SURVEILLANCE"
service = "echo-prometheus-surveillance"

[[services]]
binding = "CHAT"
service = "echo-chat"

[[services]]
binding = "KNOWLEDGE"
service = "echo-knowledge-forge"

[[services]]
binding = "CLOUD"
service = "echo-prometheus-cloud"

[triggers]
crons = [
  "*/5 * * * *",
  "0 * * * *",
  "0 0 * * *"
]
